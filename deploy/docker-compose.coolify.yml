services:
  dashboard-backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PORT=4001
      - WORKSPACE_ROOT=/workspace
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://127.0.0.1:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - /data/workspace:/workspace

  dashboard-frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    depends_on:
      - dashboard-backend
    environment:
      - VITE_API_URL=/api
      - BACKEND_PROXY_TARGET=http://dashboard-backend:4001
      - BACKEND_PROXY_WS_TARGET=ws://dashboard-backend:4001
    ports:
      - "${DASHBOARD_BIND_IP:-100.90.28.62}:5173:5173"

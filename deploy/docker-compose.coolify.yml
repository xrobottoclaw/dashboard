services:
  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: openclaw-ops-dashboard
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PORT=3100
      - WORKSPACE_ROOT=/workspace
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY}
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://127.0.0.1:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DB_PATH=/data/dashboard.sqlite
    ports:
      - "${DASHBOARD_BIND_IP:-100.90.28.62}:3100:3100"
    volumes:
      - /data/workspace:/workspace:ro
      - dashboard-data:/data

volumes:
  dashboard-data:

services:
  backend:
    build: ./backend
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DASHBOARD_USERNAME=admin
      - DASHBOARD_PASSWORD=admin123
      - JWT_SECRET=super-secret
      - WORKSPACE_ROOT=/workspace
    volumes:
      - ../:/workspace

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - BACKEND_PROXY_TARGET=http://backend:4001
      - BACKEND_PROXY_WS_TARGET=ws://backend:4001
    depends_on:
      - backend

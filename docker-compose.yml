services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-ops-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3100
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/workspace}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRES=${JWT_EXPIRES:-8h}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-change-this-api-key}
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://127.0.0.1:18789}
      - OPENCLAW_WS_URL=${OPENCLAW_WS_URL:-ws://127.0.0.1:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DB_PATH=${DB_PATH:-/data/dashboard.sqlite}
    ports:
      - "${DASHBOARD_BIND_IP:-100.90.28.62}:3100:3100"
    volumes:
      - type: bind
        source: /data/workspace
        target: /workspace
        read_only: ${DASHBOARD_WORKSPACE_READ_ONLY:-true}
      - dashboard-data:/data

volumes:
  dashboard-data:
